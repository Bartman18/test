name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "destroy" to confirm you want to delete ALL infrastructure'
        required: true
        type: string
      environment:
        description: 'Target environment (e.g. production, staging)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────────────
  # Safety gate — abort if confirmation not typed
  # ─────────────────────────────────────────────
  validate-input:
    name: Validate Destroy Confirmation
    runs-on: ubuntu-latest

    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "destroy" ]; then
            echo "❌ Confirmation text does not match 'destroy'. Aborting."
            exit 1
          fi
          echo "✅ Confirmation accepted. Proceeding with infrastructure teardown."

  # ─────────────────────────────────────────────
  # Destroy all CDK stacks in reverse order
  # ─────────────────────────────────────────────
  destroy:
    name: Destroy AWS Infrastructure
    runs-on: ubuntu-latest
    needs: validate-input
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Confirm stacks exist before destroy
        run: cdk list

      - name: Destroy all stacks (FeedbackApp stage)
        run: cdk destroy "FeedbackApp/**" --force

      - name: Confirm teardown complete
        run: |
          echo "✅ All stacks destroyed successfully for environment: ${{ github.event.inputs.environment }}"

# Amplify Console build specification
# Place this file at the repository root.
# In Amplify Console → App settings → Build settings, point App root to: front-end
#
# Required environment variables (set in Amplify Console → Environment variables):
#   REACT_APP_USER_POOL_ID        → from CDK output: FeedbackApp-Cognito › UserPoolId
#   REACT_APP_USER_POOL_CLIENT_ID → from CDK output: FeedbackApp-Cognito › UserPoolClientId
#   REACT_APP_IDENTITY_POOL_ID    → from CDK output: FeedbackApp-Cognito › IdentityPoolId
#   REACT_APP_API_URL             → from CDK output: FeedbackApp-Api    › ApiUrl  (no trailing slash)
#
# Get all outputs after deploy with:
#   aws cloudformation describe-stacks --stack-name FeedbackApp-Cognito --profile backend-test
#   aws cloudformation describe-stacks --stack-name FeedbackApp-Api     --profile backend-test

version: 1
applications:
  - appRoot: front-end
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: build
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
